type: "object"
properties:
  self:
    type: "string"
    description: "URI of the event resource"
  name:
    type: "string"
    description: "Name of the tier"
  description:
    type: "string"
    description: "Informative or promotional text containing details of the tier."
  price:
    type: "number"
    description: "Cost of purchasing tickets in this tier."
  available_from:
    type: "string"
    format: "date-time"
    description: "The date and time after which tickets in this tier can be purchased."
  available_to:
    type: "string"
    format: "date-time"
    description: "The date and time until which tickets in this tier can be purchased."
  events:
    type: "array"
    minLength: 1
    description: |
      The group of events this tier applies to. When this tier is purchased tickets are
      issued to each event listed.
    items:
      type: "object"
      properties:
        id:
          type: "integer"
          description: "Unique identfier of an event included in this tier"
        share:
          type: "number"
          description: |
            Proportion of the tier price attributable to this item. The shares of all
            bundle items must total 100.
  artwork:
    type: string
    format: "uri"
    description: "URI of the tier's associated artwork or image"
  unit_size:
    type: "integer"
    description: "The number of tickets that will be issued to the user upon purchase of this tier."
  upgrades:
    type: array
    description: "List of 'promotion tiers' to which tickets issued under this tier can be upgraded."
    items:
      $ref: "./response.yaml"
