type: "object"
properties:
  date:
    type: "string"
    format: "date-time"
    description: "The date/time at which the refund was attempted"
  amount:
    type: "number"
    format: "float"
    description: "The attempted refund amount"
  status:
    type: "string"
    enum: ["Authorised", "Declined"]
    description: "The end result of the refund attempt"