type: object
properties:
  self:
    type: "string"
    format: "uri"
    description: "URI of the transfer resource"
  status:
    type: "string"
    description: "Current status of the transfer"
  initiated:
    type: "string"
    format: "date-time"
    description: "The date and time at which the transfer was initiated"
  sender:
      $ref: "account.yaml"
  recipient:
      $ref: "account.yaml"
  tickets:
    type: "array"
    description: |
      List of tickets involved in the transfer
    items:
      type: "object"
      properties:
        name:
          type: "string"
          description: "The event section of the ticket being transferred"
        description:
          type: "string"
          description: "Detailed description of the transferred ticket"
        quantity:
          type: "number"
          description: "Number of tickets for this section being transferred"
  claims:
    type: "string"
    format: "uri"
    description: "URI for the claims collection used to complete the transfer"