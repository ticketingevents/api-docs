  ################ EVENT ADMISSIONS ################

  /events/{event}/tokens:
    parameters:
      - $ref: "event/parameters/id.yaml"

    post:
      tags:
        - Event Admissions
      summary: "Issue admission tokens"
      security:
        - SessionKey: [administrator]
      description: |
        Create tokens that authorise event staff to grant admission to the event. Tokens allow event staff to redeem tickets
        and admit patrons to one or more event sections. Each event has a global token that allows redemption of tickets for
        all sections. Additional tokens can be created, as needed, and should be issued to event staff on a one-to-one basis.
      operationId: "manage_admission_tokens"
      requestBody:
        content:
          application/json:
              schema:
                $ref: "event/token/schemas/request.yaml"
              example:
                $ref: "event/token/examples/request.yaml"
      responses:
        201:
          description: |
            The admission token was successfully added to the event
          content:
            application/json:
              schema:
                $ref: "event/token/schemas/response.yaml"
              example:
                $ref: "event/token/examples/response.yaml"
        400:
          $ref: "event/token/errors/bad_sections.yaml"

    get:
      tags:
        - Event Admissions
      parameters:
        - $ref: "pagination/parameters/records.yaml"
        - $ref: "pagination/parameters/page.yaml"
        - $ref: "event/token/parameters/global.yaml"
      summary: "List admission tokens"
      security:
        - SessionKey: [administrator]
      description: |
        Retrieve a list of tokens permitted to redeem tickets issued for this event.
      operationId: "list_event_tokens"
      responses:
        200:
          description: "The list of event tokens matching the given criteria was successfully retrieved."
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "pagination/schemas/results.yaml"
                  - $ref: "event/token/schemas/list.yaml"
              example:
                $ref: "event/token/examples/list.yaml"
        404:
          $ref: "pagination/errors/not_found.yaml"

  /events/{event}/tokens/{token}:
    parameters:
      - $ref: "event/parameters/id.yaml"
      - $ref: "event/token/parameters/id.yaml"

    get:
      tags:
        - Event Admissions
      summary: "Retrieve admission token details"
      security:
        - SessionKey: [administrator]
      description: |
        Retrieve the details of the specified admission token.
      operationId: "retrieve_admission_token"
      responses:
        200:
          description: "Details of the requested adnussion token were successfully retrieved."
          content:
            application/json:
              schema:
                $ref: "event/token/schemas/response.yaml"
              example:
                $ref: "event/token/examples/response.yaml"
        404:
          $ref: "responses/404.yaml"

    put:
      tags:
        - Event Admissions
      summary: "Modify admission token sections"
      security:
        - SessionKey: [administrator]
      description: |
        Update the event sections that the admission token can be used to grant entry to
      operationId: "update_admission_token"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "event/token/schemas/request.yaml"
            example:
              $ref: "event/token/examples/request.yaml"
      responses:
        200:
          description: |
            The admission tokens associated sections were successfully updated.
          content:
            application/json:
              schema:
                $ref: "event/token/schemas/response.yaml"
              example:
                $ref: "event/token/examples/response.yaml"
        400:
          $ref: "event/token/errors/bad_sections.yaml"
        409:
          $ref: "event/token/errors/is_global.yaml"

    delete:
      tags:
        - Event Admissions
      summary: "Invalidate an admission token"
      security:
        - SessionKey: [administrator]
      description: |
        Invalidate an admission token and remove it from the event. Invalidated tokens can no longer be used
        by event staff to redeem tickets and grant admission.
      operationId: "invalidate_admission_token"
      responses:
        200:
          description: |
            The admission token was successfully invalidated and removed from the system.
          content:
            application/json:
              schema:
                "$ref": "responses/message.yaml"
              example:
                message: "Token: /events/16993717817996/tokens/17370490770235 has been deleted."
        409:
          $ref: "event/token/errors/is_global.yaml"

  /events/{event}/tickets:
    parameters:
      - $ref: "event/parameters/id.yaml"

    get:
      tags:
        - Event Admissions
      parameters:
        - $ref: "pagination/parameters/records.yaml"
        - $ref: "pagination/parameters/page.yaml"
        - $ref: "ticket/parameters/modified_since.yaml"
      summary: "Retrieve valid event tickets"
      security:
        - SessionKey: [redeemer]
      description: |
        Retrieve a detailed list of valid event tickets issued for sections that the authenticated redeemer
        is authorised to admit patrons to.
      operationId: "list_event_tickets"
      responses:
        200:
          description: "The list of matching tickets the authenticated redeemer has access to was successfully retrieved."
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "pagination/schemas/results.yaml"
                  - $ref: "ticket/schemas/list.yaml"
              example:
                $ref: "ticket/examples/list.yaml"
        403:
          $ref: "event/admission/errors/unauthorised.yaml"
        404:
          $ref: "pagination/errors/not_found.yaml"

  /events/{event}/admissions:
    parameters:
      - $ref: "event/parameters/id.yaml"

    post:
      tags:
        - Event Admissions
      summary: "Admit event patrons"
      security:
        - SessionKey: [redeemer]
      description: |
        Attempt to admit one or more patrons to an event based on their ticket serial numbers.
        The endpoint accepts a list containing the serials of tickets to be redeemed. The system
        will admit any serials that are currently valid for the event sections that the redeemer is
        authorised to admit to, and return a list of those that were successfully redeemed.
      operationId: "admit_event_patrons"
      requestBody:
        content:
          application/json:
              schema:
                $ref: "event/admission/schemas/request.yaml"
              example:
                $ref: "event/admission/examples/request.yaml"
      responses:
        201:
          description: |
            One or more of the tickets identified by the provided serials grants admission to an 
            authorised event section and have been successfully redeemed.
          content:
            application/json:
              schema:
                $ref: "event/admission/schemas/collection.yaml"
              example:
                $ref: "event/admission/examples/collection.yaml"
        400:
          $ref: "event/admission/errors/failed.yaml"
        403:
          $ref: "event/admission/errors/unauthorised.yaml"

    get:
      tags:
        - Event Admissions
      parameters:
        - $ref: "pagination/parameters/records.yaml"
        - $ref: "pagination/parameters/page.yaml"
        - $ref: "event/admission/parameters/redeemer.yaml"
        - $ref: "event/admission/parameters/device.yaml"
        - $ref: "event/admission/parameters/ticket.yaml"
        - $ref: "event/admission/parameters/patron.yaml"
        - $ref: "event/admission/parameters/section.yaml"
      summary: "List event admissions"
      security:
        - SessionKey: [administrator]
      description: |
        Retrieve a list of admissions to the event sections that the authenticated redeemer has access to.
      operationId: "list_event_admissions"
      responses:
        200:
          description: "The list of event admissions matching the given criteria was successfully retrieved."
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "pagination/schemas/results.yaml"
                  - $ref: "event/admission/schemas/list.yaml"
              example:
                $ref: "event/admission/examples/list.yaml"
        403:
