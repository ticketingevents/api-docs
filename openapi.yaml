        403:
          $ref: "host/errors/unauthorised.yaml"
        404:
          $ref: "privilege/errors/not_found.yaml"
        409:
          $ref: "privilege/errors/owner.yaml"

    delete:
      tags:
        - Managing Host Accounts
      summary: "Revoke a host privilege"
      security:
        - SessionKey: [customer, administrator]
