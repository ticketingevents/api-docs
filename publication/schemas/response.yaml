type: "object"
properties:
  self:
    type: "string"
    description: "URI of the publication resource"
  changes:
    description: "The changes that were published."
    type: "object"
    additionalProperties:
      anyOf:
        - type: string
        - type: number
        - type: boolean
        - type: array
          items: {type: string}
  publish_at:
    description: "Date at which the changes were (or will be) published."
    type: "string"
    format: "date-time"
